name: backend-reusable

on:
  workflow_call:
    secrets:
      DOCKERHUB_TOKEN:
        required: true
    inputs:
      IMAGE_TAG:
        required: true
        type: string

jobs:
  backend:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Login Docker
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/volleyball-backend:${{ inputs.IMAGE_TAG }} backend
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/volleyball-backend:latest backend

      - name: Push image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/volleyball-backend:${{ inputs.IMAGE_TAG }}
          docker push ${{ vars.DOCKERHUB_USERNAME }}/volleyball-backend:latest
