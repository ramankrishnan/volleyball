name: volleyball-game

on: push

jobs:
  frontend:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Verify frontend server starts
        run: node server.js & sleep 5
        working-directory: frontend


  backend:
    runs-on: ubuntu-22.04
    needs: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run backend app
        run: python app.py & sleep 5
        working-directory: backend
