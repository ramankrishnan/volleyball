name: volleyball-game

on:
  push:
    branches:
      - volley

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Verify frontend server starts
        run: node server.js & sleep 5
        working-directory: frontend

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (frontend)
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/volleyball-frontend:latest frontend

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKERHUB_USERNAME }}/volleyball-frontend:latest

      - name: Push frontend image
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/volleyball-frontend:latest

  backend:
    runs-on: ubuntu-22.04
    needs: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Verify backend server starts
        run: python app.py & sleep 5
        working-directory: backend

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (backend)
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/volleyball-backend:latest backend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKERHUB_USERNAME }}/volleyball-backend:latest

      - name: Push backend image
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/volleyball-backend:latest
