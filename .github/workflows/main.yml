name: volleyball-game

on:
  push:
    branches:
      - master

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  frontend:
    uses: ./.github/workflows/frontend-reusable.yml
    with:
      IMAGE_TAG: ${{ github.sha }}
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  backend:
    needs: frontend
    uses: ./.github/workflows/backend-reusable.yml
    with:
      IMAGE_TAG: ${{ github.sha }}
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Show files
        run: ls -R

      - name: Deploy
        run: echo "Deploying..."
