name: CI Pipeline (Build + Zip + JFrog Upload)

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2️⃣ Setup Node (change if Python project)
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 3️⃣ Install Dependencies
    - name: Install Dependencies
      run: npm install

    # 4️⃣ Build Project
    - name: Build Application
      run: npm run build

    # 5️⃣ Create ZIP Artifact
    - name: Create ZIP File
      run: zip -r app-build.zip .
