<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams - Volleyball Tournament</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo"><span>🏐</span> VolleyTourney</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/register.html">Register Team</a></li>
                <li><a href="/teams.html" class="active">Teams</a></li>
                <li><a href="/matches.html">Matches</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-title">
            <h1>🏆 Registered <span>Teams</span></h1>
            <p>All teams participating in the tournament</p>
        </div>

        <div class="table-container">
            <h2>Teams List</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Team Name</th>
                        <th>Captain</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Players</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="teams-table-body">
                    <tr><td colspan="7" class="loading">Loading teams</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Volleyball Tournament Management System</p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', displayTeams);
    </script>
</body>
</html>
