<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Team - Volleyball Tournament</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo"><span>🏐</span> VolleyTourney</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/register.html" class="active">Register Team</a></li>
                <li><a href="/teams.html">Teams</a></li>
                <li><a href="/matches.html">Matches</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-title">
            <h1>📝 Register Your <span>Team</span></h1>
            <p>Fill in the details below to register your volleyball team</p>
        </div>

        <div class="form-container">
            <h2>Team Registration</h2>
            <div id="form-message"></div>
            <form id="register-form" onsubmit="registerTeam(event)">
                <div class="form-group">
                    <label for="team_name">Team Name</label>
                    <input type="text" id="team_name" name="team_name" placeholder="Enter team name" required>
                </div>
                <div class="form-group">
                    <label for="captain_name">Captain Name</label>
                    <input type="text" id="captain_name" name="captain_name" placeholder="Enter captain's full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter email address" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>
                </div>
                <div class="form-group">
                    <label for="players_count">Number of Players</label>
                    <input type="number" id="players_count" name="players_count" min="6" max="15" placeholder="6-15 players" required>
                </div>
                <button type="submit" class="btn" style="width:100%;text-align:center;">Register Team 🏐</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Volleyball Tournament Management System</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
