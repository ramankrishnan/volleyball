<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches - Volleyball Tournament</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo"><span>🏐</span> VolleyTourney</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/register.html">Register Team</a></li>
                <li><a href="/teams.html">Teams</a></li>
                <li><a href="/matches.html" class="active">Matches</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-title">
            <h1>🏐 Tournament <span>Matches</span></h1>
            <p>Schedule new matches and track scores</p>
        </div>

        <!-- Schedule Match Form -->
        <div class="form-container" style="margin-bottom: 40px;">
            <h2>Schedule a Match</h2>
            <div id="match-message"></div>
            <form id="match-form" onsubmit="scheduleMatch(event)">
                <div class="form-group">
                    <label for="team1_id">Team 1</label>
                    <select id="team1_id" required>
                        <option value="">Select Team 1</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="team2_id">Team 2</label>
                    <select id="team2_id" required>
                        <option value="">Select Team 2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="match_date">Match Date</label>
                    <input type="date" id="match_date" required>
                </div>
                <div class="form-group">
                    <label for="match_time">Match Time</label>
                    <input type="time" id="match_time" required>
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" placeholder="Enter venue/location" required>
                </div>
                <button type="submit" class="btn" style="width:100%;text-align:center;">Schedule Match 📅</button>
            </form>
        </div>

        <!-- Matches Display -->
        <div class="table-container">
            <h2>All Matches</h2>
            <div id="matches-container">
                <div class="loading">Loading matches</div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Volleyball Tournament Management System</p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadTeamOptions();
            displayMatches();
        });
    </script>
</body>
</html>
